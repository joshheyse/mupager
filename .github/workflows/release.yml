name: Release
on:
  push:
    tags: ['v*']
permissions:
  contents: write
jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - run: nix build .#
      - run: cp result/bin/mupager mupager-x86_64-linux
      - uses: actions/upload-artifact@v4
        with:
          name: mupager-x86_64-linux
          path: mupager-x86_64-linux
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install dependencies
        run: brew install mupdf ncurses
      - name: Set Homebrew pkg-config paths
        run: |
          echo "PKG_CONFIG_PATH=$(brew --prefix mupdf)/lib/pkgconfig:$(brew --prefix ncurses)/lib/pkgconfig:${PKG_CONFIG_PATH:-}" >> "$GITHUB_ENV"
          echo "CMAKE_PREFIX_PATH=$(brew --prefix mupdf);$(brew --prefix ncurses)" >> "$GITHUB_ENV"
      - name: Configure
        run: cmake -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="${CMAKE_PREFIX_PATH:-}" -S . -B build
      - name: Build
        run: cmake --build build --config Release -j$(sysctl -n hw.ncpu)
      - run: cp build/src/mupager mupager-aarch64-darwin
      - uses: actions/upload-artifact@v4
        with:
          name: mupager-aarch64-darwin
          path: mupager-aarch64-darwin
  release:
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/mupager-*/mupager-*
