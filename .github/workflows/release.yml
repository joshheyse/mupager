name: Release
on:
  push:
    tags: ['v*']
permissions:
  contents: write
jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: mupager-x86_64-linux
            install: >-
              sudo apt-get update && sudo apt-get install -y
              libmupdf-dev libncursesw5-dev
            cmake_extra: ""
          - os: macos-latest
            artifact: mupager-aarch64-darwin
            install: brew install mupdf msgpack-cxx
            cmake_extra: ""
          - os: macos-13
            artifact: mupager-x86_64-darwin
            install: brew install mupdf msgpack-cxx
            cmake_extra: ""
          - os: ubuntu-latest
            artifact: mupager-x86_64-linux-portable
            install: >-
              sudo apt-get update && sudo apt-get install -y
              libmupdf-dev libncursesw5-dev libfreetype-dev
              libharfbuzz-dev libjpeg-dev libopenjp2-7-dev
              libgumbo-dev zlib1g-dev
            cmake_extra: -DMUPAGER_STATIC_DEPS=ON
          - os: macos-latest
            artifact: mupager-aarch64-darwin-portable
            install: brew install mupdf msgpack-cxx
            cmake_extra: -DMUPAGER_STATIC_DEPS=ON
          - os: macos-13
            artifact: mupager-x86_64-darwin-portable
            install: brew install mupdf msgpack-cxx
            cmake_extra: -DMUPAGER_STATIC_DEPS=ON
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install dependencies
        run: ${{ matrix.install }}
      - name: Configure
        run: cmake -DCMAKE_BUILD_TYPE=Release ${{ matrix.cmake_extra }} -S . -B build
      - name: Build
        run: cmake --build build --config Release -j$(nproc 2>/dev/null || sysctl -n hw.ncpu)
      - name: Copy binary
        run: cp build/server/mupager ${{ matrix.artifact }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/mupager-*/mupager-*
